services:
  db:
    image: postgres:16-alpine
    container_name: employee_directory_db
    restart: unless-stopped
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-postgres}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-postgres}
      POSTGRES_DB: ${POSTGRES_DB:-employee_directory}
    ports:
      # Host port is configurable to avoid clashing with a local Postgres.
      - "${POSTGRES_PORT:-5432}:5432"
    volumes:
      - db_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-postgres}"]
      interval: 5s
      timeout: 5s
      retries: 5

  api:
    build:
      context: .
      dockerfile: apps/api/Dockerfile
    container_name: employee_directory_api
    restart: unless-stopped
    depends_on:
      db:
        condition: service_healthy
    environment:
      # Inside the network the API reaches Postgres via the service name.
      DATABASE_URL: postgresql://${POSTGRES_USER:-postgres}:${POSTGRES_PASSWORD:-postgres}@db:5432/${POSTGRES_DB:-employee_directory}?schema=public
      PORT: 3000
      JWT_SECRET: ${JWT_SECRET:-change_me}
      JWT_EXPIRES_IN: ${JWT_EXPIRES_IN:-1d}
      # Must match the origin the browser loads the UI from (for cookies/CORS).
      CORS_ORIGIN: ${CORS_ORIGIN:-http://localhost:5173}
    ports:
      - "3000:3000"

  web:
    build:
      context: .
      dockerfile: apps/web/Dockerfile
    container_name: employee_directory_web
    restart: unless-stopped
    depends_on:
      - api
    environment:
      # The browser (not the container) calls the API, so this should stay a public URL.
      VITE_API_BASE_URL: ${VITE_API_BASE_URL:-http://localhost:3000/api}
      # Enable polling-based file watching for hot reload over the bind mount.
      CHOKIDAR_USEPOLLING: "true"
    ports:
      - "5173:5173"
    volumes:
      - ./apps/web:/app/apps/web

volumes:
  db_data:
